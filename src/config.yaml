site:
  name: 'RKS, spol. s r.o.'
  site: 'https://rksba.sk'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: 'RKS — energetické riešenia a rádiokomunikácie pre firmy'
    template: '%s — RKS'
  description: 'Slovenská technologická firma od 1991. Energetika, rádiokomunikácie, varovné systémy pre firmy a komerčné budovy.'
  robots:
    # Faza pripomienkovania na new.rksba.sk: cely web je noindex, nofollow.
    # Vypnutie pri prechode na rksba.sk: prepni index a follow spat na true.
    index: false
    follow: false
  openGraph:
    site_name: RKS
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: sk
  textDirection: ltr

apps:
  blog:
    isEnabled: false
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      title: 'Blog'
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'light:only' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
